<header class="header">
  <nav class="nav container">
    <a class="logo" routerLink="/">HOODIZZ</a>

    <div class="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-3-3"></path>
      </svg>
      <input type="search" placeholder="Search hoodies, colors, drops…" class="nav-search__input" />
    </div>

    <div class="nav-actions">
      <div class="nav-links">
        <a routerLink="/products">Shop</a>
        <a routerLink="/">About</a>
      </div>

      <a routerLink="/cart" class="cart-btn" [class.cart-bounce]="isCartBouncing()">
        Cart ({{ cartStore.totalItems() }})
      </a>

      @if ((currentUser$ | async) !== null) {
        <div class="header__user">
          <button class="header__user-btn" (click)="toggleDropdown()" [attr.aria-expanded]="isDropdownOpen">
            <img [src]="getUserPhotoUrl(currentUser$ | async)"
                 [alt]="getUserDisplayName(currentUser$ | async)"
                 class="header__avatar" />
          </button>
          @if (isDropdownOpen) {
            <div class="header__dropdown" role="menu">
              <a class="header__dropdown-item" routerLink="/orders" (click)="toggleDropdown()">Orders</a>
              <button class="header__dropdown-item" (click)="logout()">Logout</button>
            </div>
          }
        </div>
      } @else {
        <a routerLink="/auth/login" class="nav-login">Login</a>
      }
    </div>
  </nav>
</header>
