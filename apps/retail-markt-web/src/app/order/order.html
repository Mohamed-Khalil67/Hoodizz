<div class="order-page">
  @let order = orderStore.orderDetail();

  @if (orderStore.error()) {
    <div class="alert alert--error">{{ orderStore.error() }}</div>
  } @else {
    <div class="card order-page__card">
      <div class="card__body">
        <h2 class="order-page__title">Order Details</h2>
        <p class="order-page__id">Order ID: {{ order?.id }}</p>

        @defer (on immediate; hydrate never) {
          <app-order-detail [order]="orderStore.orderDetail()" />
        }
      </div>
    </div>

    <div class="order-page__actions">
      <a routerLink="/orders" class="btn btn--outline">← Back to Orders</a>
      <a routerLink="/" class="btn btn--primary">Continue Shopping</a>
    </div>
  }
</div>
