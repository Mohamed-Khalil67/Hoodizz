<div class="status-page">
  <div class="status-page__icon status-page__icon--error">✕</div>
  <h1 class="status-page__title">Payment Failed</h1>
  <p class="status-page__subtitle">We couldn't process your payment. Please try again.</p>

  <div class="card status-page__card">
    <div class="card__body">
      <h2 class="status-page__card-title">Possible reasons:</h2>
      <ul class="status-page__list">
        <li>Insufficient funds</li>
        <li>Card expired or invalid</li>
        <li>Transaction declined by bank</li>
        <li>Network or connection issues</li>
      </ul>

      <div class="alert alert--info" style="margin-top: 16px">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Your cart items are still saved.</span>
      </div>
    </div>
  </div>

  <div class="status-page__actions">
    <a routerLink="/checkout" class="btn btn--primary">Try Again</a>
    <a routerLink="/cart" class="btn btn--outline">Return to Cart</a>
  </div>
</div>
