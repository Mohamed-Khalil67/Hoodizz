<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h2 class="auth-card__title">Create account</h2>
      <p class="auth-card__subtitle">Join the Hoodizz community</p>
    </div>

    @if (errorMessage()) {
      <div class="alert alert--error" role="alert">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()" #signupForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="emailInput" class="form-label">Email</label>
        <input id="emailInput" type="email" [(ngModel)]="email" name="email" required
          class="input" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="passwordInput" class="form-label">Password</label>
        <input id="passwordInput" type="password" [(ngModel)]="password" name="password" required
          minlength="6" class="input" placeholder="At least 6 characters" />
      </div>

      <button type="submit" class="btn btn--primary btn--full" [disabled]="!signupForm.form.valid">
        Sign Up
      </button>
    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <button class="btn btn--outline btn--full" (click)="signupWithGoogle()">
      Continue with Google
    </button>

    <p class="auth-card__footer">
      Already have an account?
      <a routerLink="/auth/login" class="link">Login</a>
    </p>
  </div>
</div>
