<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h2 class="auth-card__title">Welcome back</h2>
      <p class="auth-card__subtitle">Sign in to your Hoodizz account</p>
    </div>

    @if (errorMessage()) {
      <div class="alert alert--error" role="alert">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="emailInput" class="form-label">Email</label>
        <input id="emailInput" type="email" [(ngModel)]="email" name="email" required class="input"
          placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="passwordInput" class="form-label">Password</label>
        <input id="passwordInput" type="password" [(ngModel)]="password" name="password" required class="input"
          placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn--primary btn--full" [disabled]="!loginForm.form.valid">
        Login
      </button>
    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <button class="btn btn--outline btn--full" (click)="loginWithGoogle()">
      Continue with Google
    </button>

    <p class="auth-card__footer">
      Don't have an account?
      <a routerLink="/auth/signup" class="link">Sign up</a>
    </p>
  </div>
</div>
