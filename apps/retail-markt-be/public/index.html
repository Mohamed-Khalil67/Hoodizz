<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Retail Markt API</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; color: #222; }
    code { background: #f3f3f3; padding: 0.15rem 0.4rem; border-radius: 3px; }
    a { color: #0366d6; }
  </style>
</head>
<body>
  <h1>Retail Markt API</h1>
  <p>This is the backend for the Hoodizz storefront.</p>
  <ul>
    <li>GraphQL endpoint: <code>POST /api/graphql</code></li>
    <li>Stripe checkout: <code>POST /api/checkout</code></li>
    <li>Stripe webhook: <code>POST /api/stripe/webhook</code></li>
  </ul>
  <p>Frontend lives at the Vercel project for <code>retail-markt-web</code>.</p>
</body>
</html>
